<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог — Monukavto</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="brand">Monukavto</div>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Главная</a>
      <a href="cars.html" class="nav-link">Каталог</a>
      <a href="store.html" class="nav-link">О магазине</a>
      <a href="sell.html" class="nav-link btn-sell">Продать авто</a>
    </nav>
  </header>
  <main>
    <section class="catalog-section">
      <div class="catalog-header">
        <h1>Каталог автомобилей</h1>
        <p>Выберите модель и оставьте заявку на покупку</p>
      </div>
      <div id="cars-grid" class="cars-grid">
        <!-- Карточки загружаются через script.js -->
      </div>
    </section>
  </main>
  
  <div id="lead-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-modal">&times;</span>
      <h2>Оставить заявку</h2>
      <p id="modal-car-title" style="margin-bottom: 1rem; font-weight: 600;"></p>
      <form id="lead-form">
        <div class="form-group">
          <label>Ваше ФИО</label>
          <input type="text" id="lead-name" required placeholder="Иван Иванов">
        </div>
        <div class="form-group">
          <label>Номер телефона</label>
          <input type="tel" id="lead-phone" required placeholder="+7 (___) ___-__-__">
        </div>
        <button type="submit" class="btn">Отправить заявку</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <p>© 2024 Monukavto. Все права защищены.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
