<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monukstore Auto — Каталог автомобилей</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .filters { display:flex; flex-wrap:wrap; gap:0.75rem; padding:0.75rem 1rem; align-items:center; justify-content: space-between; border-bottom:1px solid #ddd; }
    .filters select, .filters input { padding:0.5rem; border-radius:6px; border:1px solid #ddd; min-width: 180px; }
    #catalog-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:16px; padding:16px; }
    .car-card { background:#fff; border-radius: 12px; overflow:hidden; box-shadow:0 6px 20px rgba(0,0,0,.08); display:flex; flex-direction:column; }
    .car-card img { width:100%; height: 180px; object-fit: cover; }
    .car-card .info { padding:12px; display:flex; flex-direction:column; gap:.25rem; }
    .car-card h3 { font-size:1.05rem; margin:0; }
    .car-card .desc { color:#555; font-size:.95rem; }
    .car-card .price { color:#e74c3c; font-weight:800; font-size:1.1rem; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="brand">Monukstore Auto</div>
    <nav class="main-nav">
      <a href="index.html">Главная</a>
      <a href="cars.html">Каталог</a>
      <a href="store.html">О магазине</a>
    </nav>
  </header>
  <main>
    <section class="hero" style="text-align:center; padding: 20px;">
      <h1>Каталог автомобилей</h1>
      <p>Быстрая сортировка, поиск и детальные карточки авто.</p>
    </section>
    <section class="filters" id="filters">
      <select id="filter-make"><option value=''>Все бренды</option></select>
      <input id="search-model" placeholder="Поиск по моделям..." />
      <div>
        <input id="year-min" type="number" placeholder="Год min" />
        <input id="year-max" type="number" placeholder="Год max" />
      </div>
      <div>
        <input id="price-min" type="number" placeholder="Цена min" />
        <input id="price-max" type="number" placeholder="Цена max" />
      </div>
      <button class="btn" id="clear-filters">Сбросить</button>
    </section>
    <section id="catalog-grid" class="grid"></section>
  </main>
  <div id="lead-modal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <span class="close" data-action="closeLeadModal">×</span>
      <h3>Оставьте заявку</h3>
      <form id="lead-form" onsubmit="return submitLead(event)">
        <label>ФИО
          <input type="text" id="lead-name" required />
        </label>
        <label>Телефон
          <input type="tel" id="lead-phone" required placeholder="+7 (___) ___-__-__" />
        </label>
        <button class="btn" type="submit">Отправить</button>
      </form>
    </div>
  </div>
  <footer style="text-align:center; padding:20px;">© 2026 Monukstore Auto</footer>
  <script src="script.js"></script>
</body>
</html>
