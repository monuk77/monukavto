<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Продать авто — Monukavto</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="brand">Monukavto</div>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Главная</a>
      <a href="cars.html" class="nav-link">Каталог</a>
      <a href="store.html" class="nav-link">О магазине</a>
      <a href="sell.html" class="nav-link btn-sell">Продать авто</a>
    </nav>
  </header>
  <main class="content">
    <section class="catalog-section">
      <div class="catalog-header">
        <h1>Хотите продать свой автомобиль?</h1>
        <p>Оставьте заявку, и мы предложим лучшую цену на рынке.</p>
      </div>
      
      <div class="sell-form-container">
        <form id="sell-form" class="sell-form">
          <div class="form-group">
            <label>Марка и модель</label>
            <input type="text" id="sell-car" required placeholder="Например: BMW X5">
          </div>
          <div class="form-group">
            <label>Год выпуска</label>
            <input type="number" id="sell-year" required placeholder="2020" min="1990" max="2025">
          </div>
          <div class="form-group">
            <label>Желаемая цена (₽)</label>
            <input type="number" id="sell-price" required placeholder="3 000 000">
          </div>
          <div class="form-group">
            <label>Ваше имя</label>
            <input type="text" id="sell-name" required placeholder="Иван">
          </div>
          <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="sell-phone" required placeholder="+7 (___) ___-__-__">
          </div>
          <button type="submit" class="btn">Отправить заявку</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="footer">
    <p>© 2024 Monukavto. Все права защищены.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
